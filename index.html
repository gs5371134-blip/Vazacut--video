<script>// Playables SDK v1.0.0
// Game lifecycle bridge: rAF-based game-ready detection + event communication
(function() {
  'use strict';

  // Idempotency: skip if already initialized (e.g., server-side injection
  // followed by client-side inject-javascript via the Bloks webview component).
  if (window.playablesSDK) return;

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
      p.timestamp = message.timestamp;
      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true
    });
  });

  window.addEventListener('unhandledrejection', function(event) {
    if (errorSent) return;
    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true
    });
  });

  // --- Public API ---

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;
      sendEvent(eventName, payload);
    }
  };

  // Kick off rAF detection in case no game code calls rAF immediately
  if (originalRAF) {
    originalRAF.call(window, onFrame);
  }
})();</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>VazaCut Pro — Editor de Vídeo Mobile</title>
<style>
:root{
  --bg:#050507;
  --surface:#11111A;
  --surface-2:#181825;
  --surface-3:#1c1c28;
  --border:#26263a;
  --text:#E2E8F0;
  --muted:#94A3B8;
  --accent1:#7C3AED;
  --accent2:#22D3EE;
  --red:#ef4444;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,sans-serif;overscroll-behavior:none}
button{font-family:inherit}
#app{display:flex;flex-direction:column;height:100dvh;width:100vw;overflow:hidden;background:var(--bg)}
header{height:56px;display:flex;align-items:center;gap:10px;padding:0 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.logo{font-weight:900;font-size:20px;letter-spacing:-.5px;display:flex;align-items:center;gap:6px}
.logo span{background:linear-gradient(90deg,var(--accent1),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
.pro-badge{background:linear-gradient(90deg,var(--accent1),var(--accent2));padding:4px 8px;border-radius:999px;font-size:11px;font-weight:800;letter-spacing:.3px;box-shadow:0 2px 10px rgba(124,58,237,.3)}
.pro-badge.hidden{display:none}
.btn-ghost{margin-left:auto;background:var(--surface-3);border:1px solid var(--border);color:var(--text);padding:9px 16px;border-radius:12px;font-size:14px;font-weight:600;min-height:40px}
.btn-ghost:active{transform:scale(.97)}

.stage{flex:1;display:flex;flex-direction:column;min-height:0}
.preview-wrap{position:relative;height:56vh;min-height:320px;background:#000;overflow:hidden;flex-shrink:0}
#previewCanvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none}
#video{display:none}
.preview-overlay{position:absolute;inset:0;pointer-events:none}
.text-overlay{position:absolute;left:50%;top:80%;transform:translateX(-50%);padding:6px 12px;background:rgba(0,0,0,.5);border-radius:8px;font-weight:700;text-shadow:0 2px 4px #000;white-space:nowrap;max-width:90%;overflow:hidden;text-overflow:ellipsis}
.preview-controls{position:absolute;left:0;right:0;bottom:0;display:flex;align-items:center;gap:12px;padding:12px 14px;background:linear-gradient(to top,rgba(0,0,0,.85),transparent);z-index:5}
.play-btn{width:48px;height:48px;border-radius:50%;background:rgba(20,20,30,.7);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);display:grid;place-items:center;color:white;font-size:20px;flex-shrink:0}
.time{font-variant-numeric:tabular-nums;font-size:13px;color:#ddd;font-weight:500;letter-spacing:.2px}
.spacer{flex:1}
.btn-icon{width:40px;height:40px;border-radius:10px;background:rgba(20,20,30,.6);border:1px solid rgba(255,255,255,.1);display:grid;place-items:center;color:#ccc;font-size:18px}

.dropzone{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:radial-gradient(600px 300px at 50% 40%,#0f0f1a,#050507);z-index:20;cursor:pointer;transition:opacity .3s,visibility .3s}
.dropzone.hidden{opacity:0;visibility:hidden;pointer-events:none}
.dz-icon{width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,var(--accent1),var(--accent2));display:grid;place-items:center;font-size:40px;box-shadow:0 10px 30px rgba(124,58,237,.3),inset 0 1px 0 rgba(255,255,255,.2)}
.dropzone h2{margin:0;font-size:22px;font-weight:800;letter-spacing:-.3px}
.dropzone p{margin:0;color:var(--muted);font-size:14px}

.timeline-wrap{height:120px;background:var(--surface);border-top:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.timeline-tools{display:flex;align-items:center;gap:10px;padding:6px 12px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--border);height:28px}
.timeline{flex:1;overflow-x:auto;overflow-y:hidden;position:relative;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.timeline::-webkit-scrollbar{display:none}
.timeline-track{position:relative;height:100%;width:max-content;min-width:100%;display:flex;align-items:center;padding:0 16px}
.thumbs{display:flex;gap:3px;height:72px;padding:10px 0}
.thumbs img{height:100%;width:auto;aspect-ratio:16/9;object-fit:cover;border-radius:8px;background:#000;border:1px solid #222;flex-shrink:0}
.trim-range{position:absolute;top:10px;bottom:10px;left:16px;right:16px;pointer-events:none;z-index:2}
.trim-range::before{content:'';position:absolute;inset:0;border:2.5px solid var(--accent2);border-radius:10px;box-shadow:0 0 0 9999px rgba(5,5,7,.75),0 0 20px rgba(34,211,238,.2)}
.handle{position:absolute;top:0;bottom:0;width:34px;pointer-events:auto;touch-action:none;display:flex;align-items:center;justify-content:center;z-index:3;cursor:ew-resize}
.handle.left{left:0;transform:translateX(-50%)}
.handle.right{right:0;transform:translateX(50%)}
.handle div{width:5px;height:72px;background:linear-gradient(180deg,var(--accent1),var(--accent2));border-radius:3px;box-shadow:0 0 12px rgba(124,58,237,.6)}
.handle::after{content:'';position:absolute;width:34px;height:34px;background:var(--surface);border:2.5px solid var(--accent2);border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.5)}
.playhead{position:absolute;top:0;bottom:0;width:3px;background:var(--red);left:50%;transform:translateX(-50%);pointer-events:none;z-index:4;box-shadow:0 0 10px rgba(239,68,68,.9)}
.playhead::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-top:9px solid var(--red);filter:drop-shadow(0 2px 2px rgba(0,0,0,.5))}

.toolbar{height:88px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:flex-start;gap:6px;padding:10px 10px calc(10px + env(safe-area-inset-bottom));overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.toolbar::-webkit-scrollbar{display:none}
.toolbar button{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;width:74px;height:68px;border-radius:16px;background:transparent;border:0;color:var(--muted);font-size:11px;font-weight:600;position:relative;transition:.2s;min-width:74px}
.toolbar button .ico{font-size:26px;line-height:1;filter:grayscale(.2)}
.toolbar button.active{color:white;background:var(--surface-3)}
.toolbar button.active .ico{filter:none}
.toolbar button.active::before{content:'';position:absolute;inset:0;border-radius:16px;padding:1.5px;background:linear-gradient(90deg,var(--accent1),var(--accent2));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude}

.sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:.25s;z-index:40}
.sheet-backdrop.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;background:var(--surface-2);border-top-left-radius:28px;border-top-right-radius:28px;max-height:78vh;display:flex;flex-direction:column;transform:translateY(105%);transition:transform .35s cubic-bezier(.2,.8,.2,1);z-index:50;box-shadow:0 -10px 40px rgba(0,0,0,.6);border:1px solid var(--border);border-bottom:0}
.sheet.show{transform:translateY(0)}
.sheet-handle{width:44px;height:5px;background:#2e2e42;border-radius:3px;margin:10px auto 6px}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:6px 18px 14px}
.sheet-header h3{margin:0;font-size:17px;font-weight:800;letter-spacing:-.2px}
.sheet-close{width:36px;height:36px;border-radius:10px;background:var(--surface-3);border:1px solid var(--border);color:var(--muted);font-size:18px;display:grid;place-items:center}
.sheet-body{overflow-y:auto;padding:0 18px 28px;flex:1}

.btn-gradient{background:linear-gradient(90deg,var(--accent1),var(--accent2));color:white;border:0;padding:14px 20px;border-radius:14px;font-weight:700;font-size:15px;width:100%;min-height:50px;box-shadow:0 6px 20px rgba(124,58,237,.25),inset 0 1px 0 rgba(255,255,255,.15);transition:.15s}
.btn-gradient:active{transform:translateY(1px) scale(.99)}
.btn-ghost-sm{background:var(--surface-3);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:12px;font-weight:600;font-size:14px;min-height:44px}

.section{margin-bottom:22px}
.section-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin:0 0 10px}
.tool-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.tool-grid button{aspect-ratio:1;background:var(--surface-3);border:1px solid var(--border);border-radius:16px;color:var(--text);font-size:12px;font-weight:600;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:78px;transition:.15s}
.tool-grid button:active{transform:scale(.96);background:#222235}
.tool-grid button .i{font-size:24px}
.row{display:flex;gap:10px;align-items:center}
.row>*{flex:1}

label.field{display:block;margin:16px 0}
.label-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:13px;color:var(--muted);font-weight:600}
.label-top span.value{color:var(--text);font-variant-numeric:tabular-nums;background:var(--surface-3);padding:3px 8px;border-radius:8px;border:1px solid var(--border);font-size:12px}
input[type=range]{width:100%;height:40px;-webkit-appearance:none;background:transparent;margin:0;touch-action:none}
input[type=range]::-webkit-slider-runnable-track{height:8px;background:#252538;border-radius:4px;border:1px solid #1e1e2e}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;background:linear-gradient(180deg,var(--accent1),var(--accent2));border-radius:50%;margin-top:-9px;border:3px solid var(--surface-2);box-shadow:0 2px 8px rgba(0,0,0,.5),0 0 0 1px rgba(0,0,0,.2)}
input[type=range]::-moz-range-track{height:8px;background:#252538;border-radius:4px}
input[type=range]::-moz-range-thumb{width:22px;height:22px;background:linear-gradient(180deg,var(--accent1),var(--accent2));border-radius:50%;border:3px solid var(--surface-2)}

.filter-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.filter-btn{position:relative;height:84px;border-radius:14px;overflow:hidden;background:#0b0b12;border:2px solid transparent;padding:0;cursor:pointer}
.filter-btn.active{border-color:var(--accent2);box-shadow:0 0 0 1px var(--accent2),0 0 16px rgba(34,211,238,.3)}
.filter-preview{position:absolute;inset:0;background:linear-gradient(135deg,#1a1a2e,#0f0f1a);display:grid;place-items:center;font-size:28px}
.filter-btn span{position:absolute;left:6px;right:6px;bottom:6px;background:rgba(5,5,7,.8);backdrop-filter:blur(6px);padding:4px 6px;border-radius:8px;font-size:11px;font-weight:700;text-align:center;border:1px solid rgba(255,255,255,.08)}

.chip-group{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:10px 14px;background:var(--surface-3);border:1px solid var(--border);border-radius:12px;font-size:13px;font-weight:600;color:var(--muted);min-height:40px}
.chip.active{background:linear-gradient(90deg,var(--accent1),var(--accent2));color:white;border-color:transparent;box-shadow:0 4px 12px rgba(124,58,237,.2)}

.input, select, textarea{width:100%;background:var(--surface-3);border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:12px;font-size:15px;min-height:48px;outline:none}
.input:focus, select:focus, textarea:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(34,211,238,.15)}
.pro-lock{position:relative}
.badge-pro{position:absolute;top:-6px;right:-6px;background:linear-gradient(90deg,#f59e0b,#ef4444);color:white;font-size:10px;font-weight:800;padding:2px 6px;border-radius:6px;letter-spacing:.3px;box-shadow:0 2px 6px rgba(0,0,0,.4)}

.toast{position:fixed;left:50%;bottom:110px;transform:translateX(-50%) translateY(20px);background:#1a1a27;border:1px solid var(--border);color:var(--text);padding:12px 18px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:.3s;z-index:100;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.format-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.format-btn{aspect-ratio:3/4;background:var(--surface-3);border:2px solid var(--border);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;font-weight:700}
.format-btn.active{border-color:var(--accent2);background:linear-gradient(180deg,rgba(124,58,237,.15),rgba(34,211,238,.1))}
.format-icon{width:36px;height:36px;border:2px solid currentColor;border-radius:6px;opacity:.8}
.format-btn[data-fmt="9:16"] .format-icon{width:22px;height:38px}
.format-btn[data-fmt="16:9"] .format-icon{width:38px;height:22px}
.format-btn[data-fmt="1:1"] .format-icon{width:32px;height:32px}
.format-btn[data-fmt="4:5"] .format-icon{width:26px;height:32px}

.toggle{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.toggle:last-child{border-bottom:0}
.toggle-label{font-size:15px;font-weight:600}
.switch{width:50px;height:30px;background:#2a2a3e;border-radius:15px;position:relative;transition:.2s;border:1px solid var(--border)}
.switch::after{content:'';position:absolute;width:24px;height:24px;background:white;border-radius:50%;top:2px;left:2px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.switch.on{background:linear-gradient(90deg,var(--accent1),var(--accent2))}
.switch.on::after{left:23px}

.pro-card{background:linear-gradient(180deg,#1a162e,#11111A);border:1px solid #3a2a6a;border-radius:20px;padding:20px;text-align:center;box-shadow:0 10px 30px rgba(124,58,237,.15),inset 0 1px 0 rgba(255,255,255,.05)}
.pro-card h3{margin:0 0 8px;font-size:22px}
.pro-card p{margin:0 0 16px;color:var(--muted);font-size:14px;line-height:1.5}
.codes-hint{margin-top:12px;font-size:12px;color:#7a7a9a}

.hidden{display:none!important}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">VazaCut<span>Pro</span></div>
    <div id="proBadge" class="pro-badge hidden">PRO</div>
    <button id="loadBtn" class="btn-ghost">Abrir</button>
    <input type="file" id="fileInput" accept="video/*" hidden>
  </header>

  <div class="stage">
    <div class="preview-wrap" id="previewWrap">
      <canvas id="previewCanvas"></canvas>
      <video id="video" playsinline crossorigin="anonymous"></video>
      <div class="preview-overlay" id="previewOverlay"></div>
      <div class="preview-controls">
        <button id="playBtn" class="play-btn">▶️</button>
        <div class="time" id="timeDisplay">00:00 / 00:00</div>
        <div class="spacer"></div>
        <button id="muteBtn" class="btn-icon">🔊</button>
      </div>
      <div class="dropzone" id="dropzone">
        <div class="dz-icon">🎬</div>
        <h2>Carregar vídeo</h2>
        <p>Toque aqui ou arraste um arquivo</p>
      </div>
    </div>

    <div class="timeline-wrap">
      <div class="timeline-tools">
        <span>Timeline</span>
        <div class="spacer"></div>
        <span id="trimInfo">00:00 - 00:00</span>
      </div>
      <div class="timeline" id="timeline">
        <div class="timeline-track" id="track">
          <div class="thumbs" id="thumbs"></div>
          <div class="trim-range" id="trimRange">
            <div class="handle left" id="hL"><div></div></div>
            <div class="handle right" id="hR"><div></div></div>
          </div>
          <div class="playhead" id="playhead"></div>
        </div>
      </div>
    </div>
  </div>

  <nav class="toolbar" id="toolbar">
    <button data-tab="video" class="active"><span class="ico">🎞️</span><span>Vídeo</span></button>
    <button data-tab="audio"><span class="ico">🎵</span><span>Áudio</span></button>
    <button data-tab="texto"><span class="ico">✏️</span><span>Texto</span></button>
    <button data-tab="efeitos"><span class="ico">✨</span><span>Efeitos</span></button>
    <button data-tab="formato"><span class="ico">⬜</span><span>Formato</span></button>
    <button data-tab="export"><span class="ico">⤓</span><span>Export</span></button>
    <button data-tab="pro"><span class="ico">👑</span><span>Pro</span></button>
  </nav>
</div>

<div class="sheet-backdrop" id="backdrop"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <h3 id="sheetTitle">Ferramentas</h3>
    <button class="sheet-close" id="sheetClose">✕</button>
  </div>
  <div class="sheet-body" id="sheetBody"></div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="musicInput" accept="audio/*" hidden>

<script type="module">
const $ = s => document.querySelector(s);
const video = $('#video');
const canvas = $('#previewCanvas');
const ctx = canvas.getContext('2d');
const thumbsEl = $('#thumbs');
const playhead = $('#playhead');
const hL = $('#hL'), hR = $('#hR'), trimRange = $('#trimRange');
const track = $('#track');

const state = {
  duration: 0,
  trimStart: 0,
  trimEnd: 1,
  speed: 1,
  volume: 1,
  filter: 'Original',
  adjustments: { brightness:100, contrast:100, saturate:100, temp:0 },
  transform: { rotate:0, flipX:false, flipY:false },
  effects: { glitch:false, shake:false, blur:0, zoom:1, mirror:false },
  format: '9:16',
  bgMode: 'blur',
  texts: [],
  isPro: localStorage.getItem('vazacut_pro') === '1',
  music: null,
};

const filters = {
  'Original': 'none',
  'Vivid': 'saturate(1.4) contrast(1.1)',
  'Cinema': 'contrast(1.2) brightness(0.9) sepia(0.25)',
  'VHS': 'contrast(1.3) saturate(1.6) hue-rotate(-8deg)',
  'Retro': 'sepia(0.6) contrast(1.1) brightness(0.95)',
  'PB': 'grayscale(1) contrast(1.1)',
  'Noir': 'grayscale(1) contrast(1.4) brightness(0.9)',
  'Sepia': 'sepia(1) contrast(0.95)',
  'Frio': 'saturate(0.85) hue-rotate(170deg) brightness(1.05)',
  'Quente': 'saturate(1.25) hue-rotate(-18deg) brightness(1.08)',
  'Drama': 'contrast(1.5) brightness(0.85) saturate(1.1)',
  'Neon': 'contrast(1.3) saturate(2) hue-rotate(190deg)',
  'Pastel': 'saturate(0.7) brightness(1.12) contrast(0.92)',
  'Claro': 'brightness(1.25) contrast(0.95)',
  'Escuro': 'brightness(0.75) contrast(1.1)',
  'Antigo': 'sepia(0.8) contrast(0.9) brightness(0.92)',
  'Fantasia': 'hue-rotate(260deg) saturate(1.7) contrast(1.05)',
  'Verão': 'saturate(1.45) brightness(1.06) hue-rotate(-12deg)',
  'Inverno': 'brightness(1.08) saturate(0.75) hue-rotate(185deg) contrast(0.95)',
};

function showToast(msg, t=2200){
  const el = $('#toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>el.classList.remove('show'), t);
}

function fmtTime(s){
  if(!isFinite(s)) return '00:00';
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
}

function updateTimeDisplay(){
  const cur = video.currentTime || 0;
  const dur = state.duration || 0;
  $('#timeDisplay').textContent = `${fmtTime(cur)} / ${fmtTime(dur)}`;
  const ts = state.trimStart * dur, te = state.trimEnd * dur;
  $('#trimInfo').textContent = `${fmtTime(ts)} - ${fmtTime(te)}`;
}

function resizeCanvas(){
  const rect = canvas.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = Math.max(1, Math.round(rect.width * dpr));
  const h = Math.max(1, Math.round(rect.height * dpr));
  if(canvas.width !== w || canvas.height !== h){
    canvas.width = w; canvas.height = h;
  }
}
window.addEventListener('resize', resizeCanvas);
new ResizeObserver(resizeCanvas).observe(canvas);

function buildFilter(){
  const parts = [];
  const base = filters[state.filter];
  if(base && base !== 'none') parts.push(base);
  parts.push(`brightness(${state.adjustments.brightness}%)`);
  parts.push(`contrast(${state.adjustments.contrast}%)`);
  parts.push(`saturate(${state.adjustments.saturate}%)`);
  const t = state.adjustments.temp;
  if(t !== 0){ parts.push(`hue-rotate(${t*0.5}deg)`); parts.push(`sepia(${Math.abs(t)*0.002})`); }
  if(state.effects.blur > 0) parts.push(`blur(${state.effects.blur}px)`);
  return parts.join(' ');
}

function drawFrame(context, w, h){
  context.save();
  context.clearRect(0,0,w,h);
  context.fillStyle = '#000';
  context.fillRect(0,0,w,h);
  if(!video.videoWidth){
    context.restore(); return;
  }
  const vw = video.videoWidth, vh = video.videoHeight;
  const vAspect = vw/vh;
  const formats = {'9:16':9/16,'16:9':16/9,'1:1':1,'4:5':4/5};
  const targetAsp = formats[state.format] || 9/16;
  const containerAsp = w/h;
  
  // calculate video draw size to fit inside target aspect
  let drawW, drawH;
  if(targetAsp > containerAsp){
    drawW = w; drawH = w / targetAsp;
  } else {
    drawH = h; drawW = h * targetAsp;
  }
  const offX = (w - drawW)/2, offY = (h - drawH)/2;
  
  // background
  if(state.bgMode === 'blur'){
    context.save();
    context.filter = 'blur(40px) brightness(0.55)';
    context.drawImage(video, offX, offY, drawW, drawH);
    context.restore();
  } else if(state.bgMode === 'color'){
    context.fillStyle = '#050507';
    context.fillRect(offX, offY, drawW, drawH);
  }
  
  // video content inside
  const videoFitScale = Math.min(drawW/vw, drawH/vh);
  const vidW = vw * videoFitScale;
  const vidH = vh * videoFitScale;
  const vidX = offX + (drawW - vidW)/2;
  const vidY = offY + (drawH - vidH)/2;
  
  context.save();
  context.beginPath();
  context.rect(offX, offY, drawW, drawH);
  context.clip();
  
  context.translate(vidX + vidW/2, vidY + vidH/2);
  const shakeX = state.effects.shake ? (Math.random()-0.5)*8 : 0;
  const shakeY = state.effects.shake ? (Math.random()-0.5)*8 : 0;
  context.translate(shakeX, shakeY);
  context.scale(state.effects.zoom, state.effects.zoom);
  context.rotate(state.transform.rotate * Math.PI/180);
  context.scale(state.transform.flipX ? -1 : 1, state.transform.flipY ? -1 : 1);
  if(state.effects.mirror) context.scale(-1,1);
  
  context.filter = buildFilter();
  if(state.effects.glitch && Math.random() < 0.25){
    const slices = 4;
    for(let i=0;i<slices;i++){
      const sy = (vh/slices)*i + Math.random()*20-10;
      const sh = vh/slices;
      const dx = (Math.random()-0.5)*30;
      context.drawImage(video, 0, sy, vw, sh, -vidW/2+dx, -vidH/2 + (i*vidH/slices), vidW, vidH/slices);
    }
  } else {
    context.drawImage(video, -vidW/2, -vidH/2, vidW, vidH);
  }
  context.restore();
  
  // texts
  const now = video.currentTime;
  state.texts.forEach(t=>{
    if(now < t.start || now > t.end) return;
    context.save();
    const size = t.size || Math.max(24, h*0.05);
    context.font = `700 ${size}px ${t.font||'Inter'}, system-ui`;
    context.fillStyle = t.color || '#fff';
    context.textAlign = 'center';
    context.textBaseline = 'middle';
    let x = (t.x ?? 0.5) * w;
    let y = (t.y ?? 0.85) * h;
    let alpha = 1;
    const prog = (now - t.start) / Math.max(0.001, t.end - t.start);
    if(t.anim === 'fade'){ alpha = prog<0.15? prog/0.15 : prog>0.85? (1-prog)/0.15 : 1; }
    if(t.anim === 'slide'){ y += (1-Math.min(1,prog*4))*40; alpha = Math.min(1, prog*3); }
    if(t.anim === 'pop'){ const s = 0.7 + 0.3 * Math.sin(Math.min(1, prog*1.5)*Math.PI); context.translate(x,y); context.scale(s,s); x=0; y=0; }
    context.globalAlpha = alpha;
    context.shadowColor = 'rgba(0,0,0,.85)';
    context.shadowBlur = Math.max(4, size*0.15);
    context.shadowOffsetY = 2;
    context.lineWidth = Math.max(3, size*0.08);
    context.strokeStyle = 'rgba(0,0,0,.7)';
    context.strokeText(t.text, x, y);
    context.fillText(t.text, x, y);
    context.restore();
  });
  
  // watermark
  if(!state.isPro && video.src){
    context.save();
    context.globalAlpha = 0.72;
    context.fillStyle = '#fff';
    const fs = Math.max(16, Math.min(w,h)*0.035);
    context.font = `800 ${fs}px Inter, system-ui`;
    context.textAlign = 'right';
    context.textBaseline = 'bottom';
    context.shadowColor = 'rgba(0,0,0,.8)';
    context.shadowBlur = 8;
    context.fillText('VazaCut', w - 18, h - 16);
    context.restore();
  }
  context.restore();
}

function renderLoop(){
  resizeCanvas();
  drawFrame(ctx, canvas.width, canvas.height);
  requestAnimationFrame(renderLoop);
}
renderLoop();

async function loadFile(file){
  if(!file) return;
  video.src = URL.createObjectURL(file);
  video.load();
  video.muted = false;
  $('#dropzone').classList.add('hidden');
  showToast('Carregando vídeo...');
}
$('#loadBtn').onclick = () => $('#fileInput').click();
$('#dropzone').onclick = () => $('#fileInput').click();
$('#fileInput').onchange = e => loadFile(e.target.files[0]);

video.addEventListener('loadedmetadata', async ()=>{
  state.duration = video.duration;
  state.trimStart = 0;
  state.trimEnd = 1;
  video.currentTime = 0;
  updateTimeDisplay();
  updateTrimUI();
  await makeThumbs();
  showToast('Vídeo pronto!');
});
video.addEventListener('timeupdate', ()=>{
  updateTimeDisplay();
  updatePlayhead();
  const endT = state.trimEnd * state.duration;
  const startT = state.trimStart * state.duration;
  if(video.currentTime >= endT - 0.03){ video.pause(); video.currentTime = endT; }
  if(video.currentTime < startT) video.currentTime = startT;
});
video.addEventListener('play', ()=>{ $('#playBtn').textContent = '⏸️'; if(state.music){ state.music.currentTime = video.currentTime; state.music.play().catch(()=>{}); }});
video.addEventListener('pause', ()=>{ $('#playBtn').textContent = '▶️'; if(state.music) state.music.pause(); });
video.addEventListener('seeked', ()=>{ if(state.music) state.music.currentTime = video.currentTime; });

$('#playBtn').onclick = ()=>{ if(!video.src) return showToast('Carregue um vídeo'); if(video.paused) video.play(); else video.pause(); };
$('#muteBtn').onclick = ()=>{
  video.muted = !video.muted;
  $('#muteBtn').textContent = video.muted ? '🔇' : '🔊';
};

async function makeThumbs(){
  thumbsEl.innerHTML = '';
  const count = 20;
  const dur = video.duration;
  if(!dur || !isFinite(dur)) return;
  const c = document.createElement('canvas'); c.width = 160; c.height = 90; const cctx = c.getContext('2d');
  const wasPaused = video.paused;
  video.pause();
  const cur = video.currentTime;
  for(let i=0;i<count;i++){
    const t = (dur * i) / count + 0.05;
    await new Promise(res=>{
      const onSeek = ()=>{ video.removeEventListener('seeked', onSeek); res(); };
      video.addEventListener('seeked', onSeek);
      video.currentTime = Math.min(t, dur-0.05);
    });
    cctx.drawImage(video,0,0,c.width,c.height);
    const img = new Image();
    img.src = c.toDataURL('image/jpeg',0.6);
    img.loading = 'lazy';
    thumbsEl.appendChild(img);
  }
  video.currentTime = cur;
  if(!wasPaused) video.play().catch(()=>{});
  updateTrimUI();
}

function updatePlayhead(){
  if(!state.duration) return;
  const trackW = track.scrollWidth - 32;
  const ratio = video.currentTime / state.duration;
  playhead.style.left = (16 + ratio * trackW) + 'px';
}

function updateTrimUI(){
  const trackW = Math.max(1, track.scrollWidth - 32);
  const l = state.trimStart * trackW;
  const r = state.trimEnd * trackW;
  trimRange.style.left = (16 + l) + 'px';
  trimRange.style.right = (16 + (trackW - r)) + 'px';
  hL.style.left = l + 'px';
  hR.style.left = r + 'px';
  // ensure playhead visible
  updatePlayhead();
}

let dragging = null;
function pointerMove(e){
  if(!dragging) return;
  const rect = track.getBoundingClientRect();
  const x = Math.max(0, Math.min(e.clientX - rect.left - 16 + track.scrollLeft, track.scrollWidth - 32));
  const ratio = x / (track.scrollWidth - 32);
  if(dragging === 'l'){
    state.trimStart = Math.min(ratio, state.trimEnd - 0.02);
    video.currentTime = state.trimStart * state.duration;
  } else {
    state.trimEnd = Math.max(ratio, state.trimStart + 0.02);
  }
  updateTrimUI();
  updateTimeDisplay();
}
hL.addEventListener('pointerdown', e=>{ dragging='l'; hL.setPointerCapture(e.pointerId); });
hR.addEventListener('pointerdown', e=>{ dragging='r'; hR.setPointerCapture(e.pointerId); });
window.addEventListener('pointermove', pointerMove);
window.addEventListener('pointerup', ()=> dragging=null);
$('#timeline').addEventListener('click', e=>{
  if(e.target.closest('.handle')) return;
  const rect = track.getBoundingClientRect();
  const x = e.clientX - rect.left - 16 + track.scrollLeft;
  const ratio = Math.max(0, Math.min(1, x / (track.scrollWidth - 32)));
  video.currentTime = ratio * state.duration;
});

// Toolbar & Sheets
const sheet = $('#sheet'), backdrop = $('#backdrop'), sheetBody = $('#sheetBody'), sheetTitle = $('#sheetTitle');
function openSheet(tab){
  sheet.classList.add('show'); backdrop.classList.add('show');
  const titles = {video:'Vídeo',audio:'Áudio',texto:'Texto',efeitos:'Efeitos',formato:'Formato',export:'Exportar',pro:'VazaCut PRO'};
  sheetTitle.textContent = titles[tab] || 'Ferramentas';
  sheetBody.innerHTML = '';
  if(tab==='video') renderVideoSheet();
  if(tab==='audio') renderAudioSheet();
  if(tab==='texto') renderTextoSheet();
  if(tab==='efeitos') renderEfeitosSheet();
  if(tab==='formato') renderFormatoSheet();
  if(tab==='export') renderExportSheet();
  if(tab==='pro') renderProSheet();
}
function closeSheet(){ sheet.classList.remove('show'); backdrop.classList.remove('show'); }
$('#sheetClose').onclick = closeSheet; backdrop.onclick = closeSheet;
document.querySelectorAll('.toolbar button').forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll('.toolbar button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    openSheet(b.dataset.tab);
  };
});

    grid.appendChild(btn);
  });
  $('#speed').oninput = e=>{ state.speed = parseFloat(e.target.value); video.playbackRate = state.speed; $('#speedVal').textContent = state.speed.toFixed(1)+'x'; };
  $('#vol').oninput = e=>{ state.volume = parseFloat(e.target.value); video.volume = state.volume; $('#volVal').textContent = Math.round(state.volume*100)+'%'; };
  $('#bright').oninput = e=>{ state.adjustments.brightness = +e.target.value; $('#bVal').textContent = e.target.value+'%'; };
  $('#contr').oninput = e=>{ state.adjustments.contrast = +e.target.value; $('#cVal').textContent = e.target.value+'%'; };
  $('#sat').oninput = e=>{ state.adjustments.saturate = +e.target.value; $('#sVal').textContent = e.target.value+'%'; };

  sheetBody.querySelector('[data-act="split"]').onclick = ()=>{ showToast('Dividido em '+fmtTime(video.currentTime)); };

  sheetBody.querySelector('[data-act="snapL"]').onclick = ()=>{ state.trimStart = video.currentTime / state.duration; updateTrimUI(); };

}

function renderTextoSheet(){

    </div>

    <button class="btn-ghost-sm pro-lock" id="autoCapBtn" style="width:100%;margin-bottom:10px">🪄 Legenda automática <span class="badge-pro">PRO</span></button>

  </div>
  <div class="section" id="txtList"></div>`;
  $('#addTxtBtn').onclick = ()=>{
    const txt = $('#txtInput').value.trim(); if(!txt) return;
    state.texts.push({ id:Date.now(), text:txt, x:0.5, y:0.82, font:$('#fontSel').value, color:$('#colorSel').value, size:0, anim:$('#animSel').value, start:video.currentTime, end:video.currentTime+3.5 });

  };
  $('#autoCapBtn').onclick = ()=>{

    const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;

    const rec = new Rec(); rec.lang='pt-BR'; rec.continuous=false; rec.interimResults=false;
    rec.onstart = ()=> showToast('Ouvindo... fale agora');
    rec.onresult = e=>{
      const txt = e.results[0][0].transcript;
      state.texts.push({id:Date.now(),text:txt,x:0.5,y:0.88,font:'Inter',color:'#fff',size:0,anim:'fade',start:Math.max(0,video.currentTime-1),end:video.currentTime+2});
      showToast('Legenda: '+txt);
    };
    rec.onerror = ()=> showToast('Erro no reconhecimento');
    rec.start();
  };
  function renderTxtList(){
    const list = $('#txtList'); list.innerHTML = '<div class="section-title">Sobreposições</div>';
    state.texts.slice(-5).reverse().forEach(t=>{
      const d = document.createElement('div'); d.style.cssText='display:flex;align-items:center;gap:8px;padding:8px;background:#1c1c28;border:1px solid var(--border);border-radius:10px;margin-bottom:6px;font-size:13px';
      d.innerHTML = `<span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.text}</span><button data-id="${t.id}" style="background:none;border:0;color:#ef4444;font-size:18px">✕</button>`;
      d.querySelector('button').onclick = ()=>{ state.texts = state.texts.filter(x=>x.id!==t.id); renderTxtList(); };
      list.appendChild(d);
    });
  }
  renderTxtList();
}

if(state.isPro) $('#proBadge').classList.remove('hidden');

async function doExport(targetH, fps){
  showToast('Iniciando exportação...');
  const formats = {'9:16':9/16,'16:9':16/9,'1:1':1,'4:5':4/5};
  const asp = formats[state.format] || 9/16;
  let w = Math.round(targetH * asp), h = targetH;
  if(asp < 1){ h = targetH; w = Math.round(targetH * asp); } else { w = targetH; h = Math.round(targetH / asp); }
  w = w - (w%2); h = h - (h%2);
  
  const exportCanvas = document.createElement('canvas'); exportCanvas.width = w; exportCanvas.height = h;
  const ectx = exportCanvas.getContext('2d');
  
  const stream = exportCanvas.captureStream(fps);
  let audioTracks = [];
  try{
    if(video.captureStream){ const vs = video.captureStream(); audioTracks = vs.getAudioTracks(); audioTracks.forEach(t=>stream.addTrack(t)); }
  }catch{}
  if(state.music && state.music.captureStream){
    try{ const ms = state.music.captureStream(); ms.getAudioTracks().forEach(t=>stream.addTrack(t)); }catch{}
  }
  
  const mime = MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus') ? 'video/webm;codecs=vp9,opus' : 'video/webm';
  const rec = new MediaRecorder(stream, { mimeType:mime, videoBitsPerSecond: resBitrate(targetH) });
  const chunks = [];
  rec.ondataavailable = e=>{ if(e.data.size) chunks.push(e.data); };
  rec.onstop = ()=>{
    const blob = new Blob(chunks, {type:'video/webm'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `VazaCut_${new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')}.webm`; a.click();
    URL.revokeObjectURL(url);
    showToast('Exportado com sucesso!');
    video.pause();
  };
  
  const start = state.trimStart * state.duration;
  const end = state.trimEnd * state.duration;
  video.currentTime = start;
  video.playbackRate = state.speed;
  video.volume = state.volume;
  video.muted = false;
  
  await video.play().catch(()=>{});
  if(state.music){ state.music.currentTime = start; state.music.play().catch(()=>{}); }
  rec.start(200);
  showToast(`Gravando ${fmtTime(end-start)} em ${w}x${h}...`);
  
  let stopped = false;
  function tick(){
    if(stopped) return;
    if(video.currentTime >= end || video.ended){
      stopped = true; rec.stop(); if(state.music) state.music.pause(); return;
    }
    drawFrame(ectx, w, h);
    requestAnimationFrame(tick);
  }
  tick();
  
  const maxMs = ((end - start) / state.speed * 1000) + 3000;
  setTimeout(()=>{ if(!stopped){ stopped = true; rec.stop(); video.pause(); if(state.music) state.music.pause(); } }, maxMs);
}

function resBitrate(h){ if(h>=2160) return 25000000; if(h>=1080) return 12000000; return 5000000; }

// drag & drop
const dz = $('#dropzone');
['dragenter','dragover'].forEach(ev=> dz.addEventListener(ev, e=>{ e.preventDefault(); dz.style.opacity=0.9; }));
['dragleave','drop'].forEach(ev=> dz.addEventListener(ev, e=>{ e.preventDefault(); dz.style.opacity=1; }));
dz.addEventListener('drop', e=>{ const f = e.dataTransfer.files?.[0]; if(f && f.type.startsWith('video/')) loadFile(f); });

// init
updateTimeDisplay();
setTimeout(()=>{ if(!video.src) openSheet('video'); }, 800);
</script>
